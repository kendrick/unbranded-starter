# Trimmed from the unbranded repo's own workflow: dropped its OS/Node matrix and
# the create-unbranded smoke step, which are CLI-internal. This runs the four
# scripts opt-ci-github's units provide (install, lint, typecheck, test) on a
# single current-LTS leg — enough signal for a scaffold, cheap to run.
#
# pnpm is the shipped default because the copy layer ships static files only; a
# package-manager-aware workflow would need a computed write like extensions.json,
# which is out of scope here. Swap the pnpm steps for your PM if you use another.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No version pin here: pnpm/action-setup reads it from package.json's
      # packageManager field, which core-node-version writes for you.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
