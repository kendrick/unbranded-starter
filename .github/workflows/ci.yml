name: CI

on:
  push:
    branches: [main]
  pull_request:

# Three jobs instead of one so the wall-clock is the slowest job, not the sum.
# `checks` (fast, full matrix) runs in parallel with `e2e` (slow real installs,
# trimmed matrix + sharded), so the typecheck/lint/unit time no longer sits on the
# critical path ahead of the e2e. `launcher-smoke` is a one-off integration check.
jobs:
  checks:
    name: checks (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full grid here because these steps are cheap and node-version behavior
        # (util.styleText, parseArgs, the npm-pack quirk) is what the two node legs
        # are really guarding. 22 is the engines floor (active LTS); 24 is current.
        os: [ubuntu-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads from package.json's
      # `packageManager` field, which is the single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # Node 22 bundles an older npm that runs the prepare hook during
      # `npm pack --dry-run --json` even with `--ignore-scripts`, corrupting the
      # JSON the pack/version e2e tests parse. Pin to a current npm (the release
      # workflow does the same) so both matrix legs behave identically.
      - run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (includes formatting via @antfu)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Catches the case where tsup succeeds but the bundle itself doesn't
      # run (e.g. a runtime import error, broken shebang, missing PKG_ROOT).
      - name: Smoke-test built CLI
        run: node dist/cli.js --version

  e2e:
    name: e2e (node ${{ matrix.node }}, ${{ matrix.os }}, shard ${{ matrix.shard }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The e2e spawns the built CLI in tmp dirs and runs real package-manager
        # installs, so it's the slow, OS-sensitive leg (PM binaries are .cmd shims
        # on Windows that bare spawn can't exec; path separators differ). Windows
        # earns its place here for that; ubuntu also runs node 24 so the color e2e
        # exercises util.styleText on the current line. The one cell we skip is
        # windows+24: a Windows-only bug still shows on windows-22, a node-24 bug on
        # ubuntu-24. Two shards per cell so the real-install suite runs in parallel.
        include:
          - {os: ubuntu-latest, node: 22, shard: 1}
          - {os: ubuntu-latest, node: 22, shard: 2}
          - {os: ubuntu-latest, node: 24, shard: 1}
          - {os: ubuntu-latest, node: 24, shard: 2}
          - {os: windows-latest, node: 22, shard: 1}
          - {os: windows-latest, node: 22, shard: 2}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      # vitest --shard splits the test files across jobs; the e2e config already
      # runs single-fork within a job, so the parallelism is across shards, not
      # within one (which would trip over shared cwd/tmp state).
      - name: E2E tests
        run: pnpm vitest run --config vitest.e2e.config.ts --shard=${{ matrix.shard }}/2

  launcher-smoke:
    name: create-unbranded launcher smoke
    # The create-unbranded launcher pins an exact `unbranded` version that only
    # resolves from the registry after publish, so the sole pre-publish way to
    # exercise the real forwarding path is to pack both packages and co-install
    # the tarballs into a throwaway project. Linux-only, once: the launcher is
    # cross-platform and its forwarding rides the Windows install/e2e legs above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Smoke-test create-unbranded launcher
        run: |
          # --ignore-scripts keeps the prepare hook (simple-git-hooks) from
          # printing to the stdout we capture the tarball name from. dist/ is
          # already built by the Build step above, so packing skips no work.
          root_tgz="$(cd "$GITHUB_WORKSPACE" && npm pack --silent --ignore-scripts)"
          create_tgz="$(cd "$GITHUB_WORKSPACE/create-unbranded" && npm pack --silent --ignore-scripts)"
          smoke="$(mktemp -d)"
          cd "$smoke"
          npm init -y >/dev/null
          npm install --no-audit --no-fund --ignore-scripts \
            "$GITHUB_WORKSPACE/$root_tgz" \
            "$GITHUB_WORKSPACE/create-unbranded/$create_tgz"
          expected="$(node -p 'require("'"$GITHUB_WORKSPACE"'/package.json").version')"
          actual="$(./node_modules/.bin/create-unbranded --version)"
          test "$actual" = "$expected"

      # Add this step if the project uses the opt-in/playwright module:
      # - name: Install Playwright browsers
      #   run: pnpm exec playwright install --with-deps chromium webkit
      # - name: Integration tests (mobile profile)
      #   run: pnpm test:e2e --project=mobile-chrome --project=mobile-safari
