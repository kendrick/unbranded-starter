name: CI

on:
  push:
    branches: [main]
  pull_request:

# The e2e is slow because a handful of specs run real package-manager installs, and
# nearly all of that time was one file: eslint-flavors runs three installs (~55s each
# on Windows), and scaffold-lint one more. vitest sharding couldn't split them (a
# file's tests stay together), so instead each heavy install runs in its own parallel
# job. `e2e-main` runs everything else with the heavy specs skipped, `e2e-flavors`
# fans the three flavors out, `e2e-scaffold` runs the full-project lint, `checks`
# carries the fast grid, and `launcher-smoke` is the one-off publish check. Wall-clock
# is now the slowest single install, not the sum. Only the launcher still upgrades npm
# (pack/version parse defensively now, so the global upgrade is gone everywhere else).
jobs:
  checks:
    name: checks (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full grid here because these steps are cheap and node-version behavior
        # (util.styleText, parseArgs) is what the two node legs are really guarding.
        # 22 is the engines floor (active LTS); 24 is current.
        os: [ubuntu-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads from package.json's
      # `packageManager` field, which is the single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (includes formatting via @antfu)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Catches the case where tsup succeeds but the bundle itself doesn't
      # run (e.g. a runtime import error, broken shebang, missing PKG_ROOT).
      - name: Smoke-test built CLI
        run: node dist/cli.js --version

  e2e-main:
    name: e2e main (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Everything except the heavy-install specs (UB_E2E_LEG=main skips those).
        # Windows earns its place: PM binaries are .cmd shims there that bare spawn
        # can't exec, and install.spec/git.spec exercise that here. ubuntu also runs
        # node 24 so the color e2e hits util.styleText on the current line. windows+24
        # is the one cell skipped: a Windows bug shows on windows-22, a node-24 bug on
        # ubuntu-24.
        include:
          - {os: ubuntu-latest, node: 22}
          - {os: ubuntu-latest, node: 24}
          - {os: windows-latest, node: 22}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: E2E tests (non-install specs)
        run: pnpm vitest run --config vitest.e2e.config.ts
        env:
          UB_E2E_LEG: main

  e2e-flavors:
    name: e2e flavor ${{ matrix.flavor }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # One real install per job so the three run concurrently instead of back to
        # back. Node 22 (the floor) is enough: flavor resolution isn't node-version
        # sensitive, and node 24 is covered by e2e-main's color leg.
        os: [ubuntu-latest, windows-latest]
        flavor: [base, react, next]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: E2E tests (eslint flavor)
        run: pnpm vitest run --config vitest.e2e.config.ts test/e2e/eslint-flavors.spec.ts
        env:
          UB_FLAVOR: ${{ matrix.flavor }}

  e2e-scaffold:
    name: e2e scaffold lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: E2E tests (fresh-scaffold full lint)
        run: pnpm vitest run --config vitest.e2e.config.ts test/e2e/scaffold-lint.spec.ts

  e2e-presets:
    name: e2e preset ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One real install per job, same shape as e2e-flavors: the preset suite
        # scaffolds a project, pnpm-installs it, then runs the scaffold's own
        # lint/typecheck/test. ubuntu-only — the PM-spawn path on Windows is
        # already covered by e2e-main's install/git legs, and next-app's install
        # is the heaviest in the suite.
        preset: [node-lib, next-app, cli]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: E2E tests (preset install)
        run: pnpm vitest run --config vitest.e2e.config.ts test/e2e/preset-install.spec.ts
        env:
          UB_PRESET: ${{ matrix.preset }}

  launcher-smoke:
    name: create-unbranded launcher smoke
    # The create-unbranded launcher pins an exact `unbranded` version that only
    # resolves from the registry after publish, so the sole pre-publish way to
    # exercise the real forwarding path is to pack both packages and co-install
    # the tarballs into a throwaway project. Linux-only, once: the launcher is
    # cross-platform and its forwarding rides the Windows install/e2e legs above.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # This job captures a tarball name from `npm pack --silent`, which node 22's
      # bundled npm can pollute with prepare-hook output; a current npm keeps that
      # capture clean. It's the one place the upgrade still earns its keep, and it's
      # cheap on Linux.
      - run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Smoke-test create-unbranded launcher
        run: |
          # --ignore-scripts keeps the prepare hook (simple-git-hooks) from
          # printing to the stdout we capture the tarball name from. dist/ is
          # already built by the Build step above, so packing skips no work.
          root_tgz="$(cd "$GITHUB_WORKSPACE" && npm pack --silent --ignore-scripts)"
          create_tgz="$(cd "$GITHUB_WORKSPACE/create-unbranded" && npm pack --silent --ignore-scripts)"
          smoke="$(mktemp -d)"
          cd "$smoke"
          npm init -y >/dev/null
          npm install --no-audit --no-fund --ignore-scripts \
            "$GITHUB_WORKSPACE/$root_tgz" \
            "$GITHUB_WORKSPACE/create-unbranded/$create_tgz"
          expected="$(node -p 'require("'"$GITHUB_WORKSPACE"'/package.json").version')"
          actual="$(./node_modules/.bin/create-unbranded --version)"
          test "$actual" = "$expected"

      # Add this step if the project uses the opt-in/playwright module:
      # - name: Install Playwright browsers
      #   run: pnpm exec playwright install --with-deps chromium webkit
      # - name: Integration tests (mobile profile)
      #   run: pnpm test:e2e --project=mobile-chrome --project=mobile-safari
