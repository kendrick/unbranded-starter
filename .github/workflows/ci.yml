name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` — pnpm/action-setup reads from package.json's
      # `packageManager` field, which is the single source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (includes formatting via @antfu)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      # Catches the case where tsup succeeds but the bundle itself doesn't
      # run (e.g. a runtime import error, broken shebang, missing PKG_ROOT).
      - name: Smoke-test built CLI
        run: node dist/cli.js --version

      # Add this step if the project uses the opt-in/playwright module:
      # - name: Install Playwright browsers
      #   run: pnpm exec playwright install --with-deps chromium webkit
      # - name: Integration tests (mobile profile)
      #   run: pnpm test:e2e --project=mobile-chrome --project=mobile-safari
